<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Enterns Tech</title>
  <link rel="stylesheet" href="/static/css/portal.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;
         background:var(--enp-bg);}
    .login-card{background:var(--enp-surface);border:1px solid var(--enp-border);
                border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px;}
    .login-logo{text-align:center;margin-bottom:2rem;}
    .login-logo a{color:var(--enp-cyan);font-size:1.5rem;font-weight:700;text-decoration:none;}
    .login-logo p{color:var(--enp-muted);font-size:.9rem;margin:.4rem 0 0;}
    .form-group{margin-bottom:1.2rem;}
    .form-group label{display:block;color:var(--enp-muted);font-size:.85rem;margin-bottom:.4rem;}
    .form-group input{width:100%;padding:.7rem 1rem;background:#0a0f1e;border:1px solid var(--enp-border);
                      border-radius:8px;color:var(--enp-text);font-size:.95rem;font-family:inherit;
                      outline:none;transition:border-color .15s;}
    .form-group input:focus{border-color:var(--enp-cyan);}
    .login-btn{width:100%;padding:.8rem;background:var(--enp-cyan);color:#05080f;font-weight:700;
               font-size:1rem;border:none;border-radius:8px;cursor:pointer;font-family:inherit;
               transition:opacity .15s;margin-top:.5rem;}
    .login-btn:hover{opacity:.88;}
    .error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
               color:var(--enp-red);padding:.75rem 1rem;border-radius:8px;font-size:.9rem;
               margin-bottom:1rem;}
    .success-box{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
                 color:var(--enp-green);padding:.75rem 1rem;border-radius:8px;font-size:.9rem;
                 margin-bottom:1rem;}
    .login-footer{text-align:center;margin-top:1.5rem;color:var(--enp-muted);font-size:.85rem;}
    .login-footer a{color:var(--enp-cyan);}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <a href="/">Enterns Tech</a>
      <p>Sign in to your portal</p>
    </div>

    {% if request.query_params.get('msg') == 'password_set' %}
    <div class="success-box">Password set! You can now sign in.</div>
    {% endif %}

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Email / Username</label>
        <input type="text" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="login-footer">
      Interested in mentoring? <a href="/partner">Apply here</a>
    </div>
  </div>
</body>
</html>
