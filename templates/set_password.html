<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password — Enterns Tech</title>
  <link rel="stylesheet" href="/static/css/portal.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--enp-bg);}
    .card{background:var(--enp-surface);border:1px solid var(--enp-border);border-radius:16px;
          padding:2.5rem 2rem;width:100%;max-width:420px;}
    .card h2{color:var(--enp-cyan);margin:0 0 1.5rem;}
    .form-group{margin-bottom:1.2rem;}
    .form-group label{display:block;color:var(--enp-muted);font-size:.85rem;margin-bottom:.4rem;}
    .form-group input{width:100%;padding:.7rem 1rem;background:#0a0f1e;border:1px solid var(--enp-border);
                      border-radius:8px;color:var(--enp-text);font-size:.95rem;font-family:inherit;outline:none;}
    .form-group input:focus{border-color:var(--enp-cyan);}
    .btn{width:100%;padding:.8rem;background:var(--enp-cyan);color:#05080f;font-weight:700;
         border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:1rem;}
    .error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
               color:var(--enp-red);padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Set Your Password</h2>
    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
    <form method="POST" action="/set-password">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn">Set Password</button>
    </form>
  </div>
</body>
</html>
