<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Enterns Tech{% endblock %}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/portal.css">
  {% block head %}{% endblock %}
  <style>
    .nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;
         background:var(--enp-surface);border-bottom:1px solid var(--enp-border);position:sticky;top:0;z-index:100;}
    .nav-logo{color:var(--enp-cyan);font-weight:700;font-size:1.2rem;text-decoration:none;}
    .nav-links{display:flex;gap:1rem;align-items:center;}
    .nav-links a{color:var(--enp-muted);text-decoration:none;font-size:.9rem;transition:color .15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--enp-text);}
    .nav-links .logout-btn{background:transparent;border:1px solid var(--enp-border);color:var(--enp-muted);
                           padding:.35rem .8rem;border-radius:6px;cursor:pointer;font-size:.85rem;
                           font-family:inherit;transition:all .15s;}
    .nav-links .logout-btn:hover{color:var(--enp-red);border-color:var(--enp-red);}
    .page-wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="/">Enterns Tech</a>
    <div class="nav-links">
      {% block nav_links %}{% endblock %}
    </div>
  </nav>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
