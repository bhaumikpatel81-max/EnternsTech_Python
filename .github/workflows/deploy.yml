name: CI

# Runs on every push to main and on pull requests.
# Deployment to Bluehost is manual via cPanel Git Version Control
# or SFTP — no automated deploy step here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.9)
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      SECRET_KEY: ci-test-secret-key-32-chars-long!
      CRON_SECRET: ci-test-cron-secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install runtime + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
